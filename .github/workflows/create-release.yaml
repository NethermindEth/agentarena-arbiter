name: Create Release Summary

on:
  workflow_call:
    inputs:
      version_tag:
        description: "Version tag for the release"
        required: true
        type: string
      release_name:
        description: "Name of the release"
        required: true
        type: string

permissions:
  contents: read

jobs:
  summary:
    name: Release Summary
    runs-on: ubuntu-latest

    steps:
      - name: Print release summary
        run: |
          echo "========================================"
          echo "Release Complete"
          echo "========================================"
          echo "Version: ${{ inputs.version_tag }}"
          echo "Release: ${{ inputs.release_name }}"
          echo "Source commit: ${{ github.sha }}"
          echo ""
          echo "Images pushed to JFrog:"
          echo "Arbiter:"
          echo "- nethermind.jfrog.io/kyoto-oci-local-prod/agentarena-arbiter:${{ inputs.version_tag }}"
          echo "- nethermind.jfrog.io/kyoto-oci-local-prod/agentarena-arbiter:latest"
          echo ""
          echo "GitHub Release:"
          echo "- ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.version_tag }}"
          echo "========================================"
