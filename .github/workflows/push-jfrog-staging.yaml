name: Build and Push images on jfrog staging

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  attestations: write
  artifact-metadata: write
  contents: read

jobs:
  build-arbiter-staging:
    uses: NethermindEth/github-workflows/.github/workflows/docker-build-push-jfrog.yaml@v2.0.0
    with:
      repo_name: kyoto-oci-local-staging
      image_name: agentarena-arbiter
      platforms: "linux/amd64"
      ignore_trivy: true
      context: ./Demo
      dockerfile_path: ./Demo/Dockerfile
      docker_build_args: |
        GITHUB_SHA=${{ github.sha }}
      push: ${{ github.event_name != 'pull_request' }}
