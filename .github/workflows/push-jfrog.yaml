name: Build and Push images on jfrog

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  attestations: write
  contents: write
  pull-requests: write

env:
  DOCKER_REGISTRY: nethermind.jfrog.io
  REPO_STAGING: kyoto-oci-local-staging
  REPO_PROD: kyoto-oci-local-prod
  IMAGE_NAME: agentarena-arbiter

jobs:
  build:
    uses: NethermindEth/github-workflows/.github/workflows/docker-build-push-jfrog.yaml@v1.12.0
    with:
      repo_name: kyoto-oci-local-staging
      image_name: agentarena-arbiter
      platforms: "linux/amd64"
      ignore_trivy: false
      run_trivy: true
      context: ./Demo
      dockerfile_path: ./Demo/Dockerfile
      additional_tags: ${{ github.sha }}
      docker_build_args: |
        GITHUB_SHA=${{ github.sha }}
      push: ${{ github.event_name != 'pull_request' }}

  # Only on main: release-please creates a semver release, then ORAS promotes
  # the already-pushed staging image to production — no rebuild
  release:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ !failure() && github.ref == 'refs/heads/main' }}
    outputs:
      release_version: ${{ steps.set_release_version.outputs.release_version }}
      created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple

      - name: Set release version
        id: set_release_version
        run: |
          release_version=v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
          echo "Release version: $release_version"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

  promote-production:
    runs-on: ubuntu-latest
    needs: [build, release]
    if: ${{ !failure() && github.ref == 'refs/heads/main' && needs.release.outputs.created }}
    environment:
      name: production
    steps:
      - name: Install JFrog CLI
        id: jfrog
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://${{ env.DOCKER_REGISTRY }}
        with:
          oidc-provider-name: github-nethermindeth

      - name: Login to registry with OIDC
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ steps.jfrog.outputs.oidc-user }}
          password: ${{ steps.jfrog.outputs.oidc-token }}

      - uses: oras-project/setup-oras@v1

      - name: Promote staging image to Production
        run: |
          original_tag=${{ env.DOCKER_REGISTRY }}/${{ env.REPO_STAGING }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          new_tag=${{ env.DOCKER_REGISTRY }}/${{ env.REPO_PROD }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.release_version }}
          oras cp -r $original_tag $new_tag,latest
